name: Sync from upstream bookends.koplugin

on:
  schedule:
    - cron: '0 9 * * 5'  # Friday at 09:00 UTC (18:00 JST)
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/AndyHazz/bookends.koplugin.git
          git fetch upstream master

      - name: Merge from upstream bookends.koplugin
        run: |
          if git merge upstream/master --no-edit; then
            echo "MERGE_FAILED=false" >> $GITHUB_ENV
          else
            # Create a branch with the conflicted state for PR review
            git merge --abort
            BRANCH="upstream-sync-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git merge upstream/master --no-edit || true
            git add -A
            git commit -m "WIP: upstream sync $(date +%Y-%m-%d) — conflicts need resolution"
            git push origin "$BRANCH"
            echo "MERGE_FAILED=true" >> $GITHUB_ENV
            echo "SYNC_BRANCH=$BRANCH" >> $GITHUB_ENV
          fi

      - name: Push
        if: env.MERGE_FAILED != 'true'
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor origin/master HEAD; then
            git rebase origin/master
          fi
          git push origin master

      - name: Create PR on merge conflict
        if: env.MERGE_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync ${new Date().toISOString().slice(0,10)}: conflicts need resolution`,
              head: process.env.SYNC_BRANCH,
              base: 'master',
              body: `Automatic sync from AndyHazz/bookends.koplugin failed due to merge conflicts.\n\nThis PR contains the conflicted state — please resolve the markers and merge.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
